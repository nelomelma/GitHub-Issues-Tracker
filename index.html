<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- LOGIN PAGE -->
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="fa-brands fa-github"></i>
      </div>

      <h1>GitHub Issues Tracker</h1>
      <p class="login-subtitle">Sign in to manage your issues</p>

      <form id="loginForm" class="login-form">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          placeholder="Enter Username"
          autocomplete="off"
        />
        <p class="default-text">Default: admin</p>

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
        />
        <p class="default-text">Default: admin123</p>

        <button type="submit" class="sign-in-btn">Sign In</button>
      </form>

      <div class="divider">
        <span></span>
        <p>OR</p>
        <span></span>
      </div>

      <div class="demo-box">
        <p class="demo-title">Demo Credentials:</p>
        <div class="demo-credentials">
          <p><strong>Username:</strong> admin</p>
          <p><strong>Password:</strong> admin123</p>
        </div>
      </div>

      <p id="loginError" class="error-message"></p>
    </div>
  </section>

  <!-- MAIN PAGE -->
  <section id="mainPage" class="main-page hidden">
    <nav class="navbar">
      <div class="nav-left">
        <i class="fa-brands fa-github"></i>
        <h2>GitHub Issues Tracker</h2>
      </div>

      <div class="nav-right">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            type="text"
            id="searchInput"
            placeholder="Search issues..."
          />
        </div>
        <button class="new-issue-btn">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>
    </nav>

    <main class="container">
      <section class="tabs-wrapper">
        <div class="tabs">
          <button class="tab-btn active" data-filter="all">All</button>
          <button class="tab-btn" data-filter="open">Open</button>
          <button class="tab-btn" data-filter="closed">Closed</button>
        </div>
      </section>

      <section class="summary-card">
        <div class="summary-left">
          <div class="summary-icon">
            <i class="fa-brands fa-codepen"></i>
          </div>
          <div>
            <h3><span id="issueCount">0</span> Issues</h3>
            <p>Track and manage your project issues</p>
          </div>
        </div>

        <div class="summary-right">
          <div class="legend-item">
            <span class="dot open-dot"></span>
            <span>Open</span>
          </div>
          <div class="legend-item">
            <span class="dot closed-dot"></span>
            <span>Closed</span>
          </div>
        </div>
      </section>

      <div id="loader" class="loader-wrapper">
        <div class="spinner"></div>
      </div>

      <section id="issuesGrid" class="issues-grid"></section>
    </main>
  </section>

  <!-- MODAL -->
  <div id="issueModal" class="modal hidden">
    <div class="modal-box">
      <button id="closeX" class="close-x">&times;</button>

      <h2 id="modalTitle"></h2>

      <div class="modal-meta-row">
        <span id="modalStatusBadge" class="status-main-badge"></span>
        <span class="meta-divider">•</span>
        <span id="modalAuthorText"></span>
        <span class="meta-divider">•</span>
        <span id="modalDateText"></span>
      </div>

      <div id="modalLabels" class="modal-labels"></div>

      <p id="modalDescription" class="modal-description"></p>

      <div class="modal-info-box">
        <div>
          <p class="info-title">Assignee:</p>
          <p id="modalAssignee" class="info-value"></p>
        </div>
        <div>
          <p class="info-title">Priority:</p>
          <span id="modalPriority" class="priority-chip"></span>
        </div>
      </div>

      <div class="modal-actions">
        <button id="closeModalBtn" class="modal-close-btn">Close</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
